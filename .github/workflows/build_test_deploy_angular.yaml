name: Build, Test and Deploy Angular Application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.x]
    steps:
      - uses: actions/checkout@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      # Add later
      #      - name: Run Tests
      #        run: npm run test:ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: dist/integration_deploiement_personal_front/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build_test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Angular Deploy gh-pages Actions
        uses: AhsanAyaz/angular-deploy-gh-pages-actions@v1.4.0
        with:
          angular_project_dir: './'
          github_access_token: ${{ secrets.GH_TOKEN }} # see the Configuration section for how you can create secrets
          build_configuration: production
          base_href: https://strackzdev.github.io/y_integration_deploiement/   # make sure this corresponds to https://<your_username>.github.io/<base_href>/
          deploy_branch: master # The branch the action should deploy to.
          angular_dist_build_folder: dist # The folder where your project is supposed to be after running ng build by the action.

